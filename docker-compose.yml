services:
  nginx:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - dissentlab

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - dissentlab_db:/data/db
      - dissentlab_chroma:/data/chroma
      - dissentlab_models:/data/models
      - dissentlab_cache:/data/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - dissentlab

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dissentlab

volumes:
  dissentlab_db:
  dissentlab_chroma:
  dissentlab_models:
  dissentlab_cache:

networks:
  dissentlab:
    driver: bridge
